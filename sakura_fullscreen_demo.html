
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07000f;overflow:hidden;min-height:700px;position:relative}
#sky{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#1a0030 0%,#07000f 65%)}
canvas#sakura-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.08}50%{opacity:.7}}
.logo-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:10}
.logo-h1{font-family:Georgia,'Times New Roman',serif;font-size:4rem;font-weight:700;letter-spacing:6px;margin-bottom:.5rem;
  background:linear-gradient(135deg,#ff6b9d,#c084fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{color:#9d7ab8;font-size:.95rem;letter-spacing:3px;margin-bottom:2.5rem}
.glow-ring{position:absolute;width:320px;height:320px;border-radius:50%;
  border:1px solid rgba(168,85,247,.12);animation:ring 4s ease-in-out infinite}
.glow-ring:nth-child(2){width:480px;height:480px;animation-delay:1.3s;border-color:rgba(255,107,157,.08)}
.glow-ring:nth-child(3){width:640px;height:640px;animation-delay:2.6s;border-color:rgba(129,140,248,.06)}
@keyframes ring{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.04);opacity:1}}
.enter-btn{padding:1rem 3.2rem;border-radius:50px;font-size:1rem;font-weight:500;letter-spacing:2px;
  background:linear-gradient(135deg,#ff6b9d,#a855f7);color:#fff;border:none;cursor:pointer;
  box-shadow:0 0 50px rgba(168,85,247,.4);animation:pg 2.5s ease-in-out infinite;transition:transform .25s}
.enter-btn:hover{transform:scale(1.07)}
@keyframes pg{0%,100%{box-shadow:0 0 40px rgba(168,85,247,.4)}50%{box-shadow:0 0 80px rgba(255,107,157,.65)}}
.tip{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);color:rgba(157,122,184,.5);font-size:.75rem;letter-spacing:1px;font-family:system-ui,sans-serif}
</style>

<div id="sky">
  <div id="stars-layer"></div>
  <canvas id="sakura-canvas"></canvas>
  <div class="logo-wrap">
    <div class="glow-ring"></div>
    <div class="glow-ring"></div>
    <div class="glow-ring"></div>
    <div class="logo-h1">AnimeTime</div>
    <div class="logo-sub">✦ 你的专属动漫时光 ✦</div>
    <button class="enter-btn">✦ 进入动漫世界 ✦</button>
  </div>
  <div class="tip">↓ 将此动画嵌入完整版网站首屏</div>
</div>

<script>
// Stars
(function(){
  const sl=document.getElementById('stars-layer');
  for(let i=0;i<160;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=.3+Math.random()*2;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;
    sl.appendChild(s);
  }
})();

// Sakura Canvas
const canvas=document.getElementById('sakura-canvas');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
}
resize();
window.addEventListener('resize',()=>{resize();initPetals()});

const COLORS=['#ffb7d5','#ff8fc8','#ffc2e2','#f9a8d4','#e879a0','#fda4af','#fbcfe8','#f0abfc'];

class Petal{
  constructor(fromTop){
    this.reset(fromTop);
  }
  reset(fromTop){
    this.x=Math.random()*canvas.width;
    this.y=fromTop?(-10-Math.random()*canvas.height*0.5):Math.random()*canvas.height;
    this.size=4+Math.random()*9;
    this.speedY=0.4+Math.random()*1.1;   // slow natural fall
    this.speedX=(-0.4+Math.random()*0.8); // gentle sideways drift
    this.rot=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-.5)*0.025;
    this.swing=Math.random()*Math.PI*2;
    this.swingAmp=0.4+Math.random()*0.7;
    this.swingFreq=0.008+Math.random()*0.012;
    this.opacity=0.55+Math.random()*0.45;
    this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
    this.scaleX=0.8+Math.random()*.4;
  }
  update(){
    this.swing+=this.swingFreq;
    this.x+=this.speedX+Math.sin(this.swing)*this.swingAmp;
    this.y+=this.speedY;
    this.rot+=this.rotSpeed;
    if(this.y>canvas.height+20||this.x<-60||this.x>canvas.width+60){
      this.reset(true);
    }
  }
  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rot);
    ctx.scale(this.scaleX,1);
    ctx.globalAlpha=this.opacity;
    // petal shape: two bezier lobes
    ctx.beginPath();
    const s=this.size;
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(s*.6,-s*.8,s*1.2,0,0,s*.9);
    ctx.bezierCurveTo(-s*1.2,0,-s*.6,-s*.8,0,0);
    ctx.fillStyle=this.color;
    ctx.fill();
    // highlight shimmer
    ctx.beginPath();
    ctx.ellipse(s*.15,-s*.2,s*.25,s*.12,-.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.fill();
    ctx.restore();
  }
}

let petals=[];
function initPetals(){
  petals=[];
  const count=Math.min(Math.floor(canvas.width*canvas.height/4800),110);
  for(let i=0;i<count;i++) petals.push(new Petal(false));
}
initPetals();

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of petals){p.update();p.draw()}
  requestAnimationFrame(loop);
}
loop();
</script>
